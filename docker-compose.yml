services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bakery-webapp-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: Bakery Inventory App
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8088
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: bakery_webapp
      DB_USERNAME: bakery_user
      DB_PASSWORD: bakery_password
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    ports:
      - "8088:80"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: bakery-webapp-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: bakery_webapp
      MYSQL_USER: bakery_user
      MYSQL_PASSWORD: bakery_password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - bakery_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: bakery-webapp-phpmyadmin
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  bakery_mysql_data:
